<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><title>StarPad — Minhas Listas</title><link rel="stylesheet" href="style.css"></head>
<body>
    <header class="main-header">...</header>
    <main class="main-content">
        <h1>📋 Minhas Listas</h1>
        <div style="background:var(--bg-card);padding:1.5rem;border-radius:var(--radius);border:1px solid var(--border-color);margin:1.5rem 0;">
            <h3>➕ Nova Lista</h3>
            <form><div style="display:flex;gap:1rem;align-items:end;flex-wrap:wrap;"><div class="form-group" style="flex:1;min-width:200px;margin:0;"><label>Nome da lista:</label><input type="text" placeholder="Jogos Zerados 2026"></div><div class="form-group" style="margin:0;"><label><input type="checkbox" checked> 🌐 Pública</label></div><button class="btn-primary">Criar</button></div></form>
        </div>
        <div class="list-card"><h3>Jogos Zerados 2026 <span style="font-size:0.8rem;color:var(--text-muted);">(8 jogos • 🌐 Pública)</span></h3>
            <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.5rem;">
                <span class="tag">Elden Ring</span><span class="tag">Hades</span><span class="tag">Baldur's Gate 3</span>
            </div>
        </div>
    </main>
    <footer class="main-footer">...</footer>
</body>
</html>
